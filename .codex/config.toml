model = "gpt-5.4"
model_reasoning_effort = "high"
plan_mode_reasoning_effort = "xhigh"
tool_output_token_limit = 50000
# Leave room for native compaction near the 272–273k context window.
# Formula: 273000 - (tool_output_token_limit + 15000)
# With tool_output_token_limit=25000 ⇒ 273000 - (25000 + 15000) = 233000
model_context_window = 546000
# (546000 - (50000 + 30000)) = 466000
model_auto_compact_token_limit = 466000
web_search = "live"
personality = "pragmatic"

[projects."/mnt/ssd1/shreyansh"]
trust_level = "trusted"

[projects."/home/shreyansh"]
trust_level = "untrusted"

[projects."/mnt/ssd1/shreyansh/home_dir/scan-cuda"]
trust_level = "trusted"

[projects."/Users/shreyansh/Projects"]
trust_level = "trusted"

[projects."/Users/shreyansh/Projects/track-project"]
trust_level = "trusted"

[projects."/Users/shreyansh/Projects/track-repos"]
trust_level = "trusted"

[projects."/Users/shreyansh/Projects/excalidraw"]
trust_level = "trusted"

[projects."/Users/shreyansh"]
trust_level = "trusted"

[projects."/Users/shreyansh/Projects/codex-app-vibe-code"]
trust_level = "trusted"

[features]
ghost_commit = false
unified_exec = true
shell_snapshot = true
apply_patch_freeform = true
skills = true
steer = true
multi_agent = true
collaboration_modes = true
voice_transcription = true  
prevent_idle_sleep = true
js_repl = true

[sandbox_workspace_write]
network_access = true

[agents]
max_threads = 16

[agents.sparky]
config_file = "agents/sparky.toml"
description = "Use for executing implementation tasks from a structured plan."

[agents.worker_high]
config_file = "agents/worker_high.toml"
description = "Generic worker agent. gpt-5.3-codex with high reasoning effort."

[mcp_servers.excalidraw]
url = "https://mcp.excalidraw.com/mcp"

[mcp_servers.remnote]
url = "http://127.0.0.1:3001/mcp"

[mcp_servers.asana]
command = "bash"
args = [
"-lc",
'npx -y mcp-remote@latest https://mcp.asana.com/v2/mcp 3334 --static-oauth-client-info "{\"client_id\":\"${ASANA_CLIENT_ID}\", \"client_secret\":\"${ASANA_CLIENT_SECRET}\"}" --resource https://mcp.asana.com/v2'
]
env_vars = ["ASANA_CLIENT_ID", "ASANA_CLIENT_SECRET"]

[notice.model_migrations]
"gpt-5.1-codex-max" = "gpt-5.3-codex"

[tui]
status_line = ["model-with-reasoning", "context-remaining", "current-dir", "git-branch", "context-window-size", "used-tokens"]
